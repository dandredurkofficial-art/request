<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audiory | Feature Requests</title>
    <style>
        :root { --blue: #3730a3; --gray: #f4f6f8; }
        body { font-family: sans-serif; background: var(--gray); margin: 0; }
        header { background: var(--blue); color: white; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: 500; }
        .container { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; padding: 1.5rem; margin-bottom: 1rem; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        footer { text-align: center; padding: 3rem; color: #888; }
        #detailView { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">Audiory</div>
    <nav>
        <a href="https://audiory.site">Back to Website</a>
        <a href="#" id="authBtn">Login</a>
    </nav>
</header>

<div class="container" id="listView">
    <h2>Feature Requests</h2>
    <div id="requestList"></div>
    <hr>
    <h3>Suggest a Feature</h3>
    <input type="text" id="reqTitle" placeholder="Title" style="width:100%; padding:10px; margin-bottom:10px;"><br>
    <textarea id="reqDesc" placeholder="Description" style="width:100%; padding:10px;"></textarea><br>
    <button class="btn" onclick="submitRequest()">Submit</button>
</div>

<div class="container" id="detailView">
    <button onclick="goBack()">← Back to list</button>
    <div id="requestDetail"></div>
    <h3>Comments</h3>
    <div id="commentList"></div>
    <textarea id="commentText" placeholder="Add a comment..."></textarea>
    <button class="btn" onclick="postComment()">Post Comment</button>
</div>

<footer>&copy; 2026 Audiory. All rights reserved.</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { /* ADD YOUR FIREBASE CONFIG HERE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let currentReqId = null;

    // --- RENDER LIST ---
    const q = query(collection(db, "requests"), orderBy("votes", "desc"));
    onSnapshot(q, (snap) => {
        const list = document.getElementById('requestList');
        list.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            list.innerHTML += `<div class="card" onclick="viewRequest('${d.id}')">
                <h3>${data.title}</h3>
                <p>${data.description}</p>
                <small>By: ${data.handle} | Votes: ${data.votes}</small>
                <button onclick="event.stopPropagation(); vote('${d.id}')">Vote</button>
            </div>`;
        });
    });

    // --- LOGIC ---
    window.submitRequest = async () => {
        if (!auth.currentUser) return alert("Login required");
        await addDoc(collection(db, "requests"), {
            title: document.getElementById('reqTitle').value,
            description: document.getElementById('reqDesc').value,
            handle: auth.currentUser.displayName || "User",
            votes: 0,
            createdAt: serverTimestamp()
        });
        alert("Request added!");
    };

    window.vote = async (id) => {
        await updateDoc(doc(db, "requests", id), { votes: increment(1) });
    };

    window.viewRequest = (id) => {
        currentReqId = id;
        document.getElementById('listView').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        // Logic to fetch comments for this ID would go here...
    };

    window.goBack = () => {
        document.getElementById('listView').style.display = 'block';
        document.getElementById('detailView').style.display = 'none';
    };

    // Auth Handler
    document.getElementById('authBtn').onclick = () => {
        if (auth.currentUser) signOut(auth);
        else signInWithPopup(auth, new GoogleAuthProvider());
    };
</script>

</body>
</html>
