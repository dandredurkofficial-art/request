<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiory | Feature Requests</title>
    <style>
        :root { --primary: #3730a3; --bg: #f4f6f8; }
        body { font-family: system-ui; background: var(--bg); margin: 0; }
        header { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 40px; height: 40px; }
        .nav-links a { color: white; margin-left: 20px; text-decoration: none; }
        .main-content { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .request-card { background: white; padding: 1.5rem; margin-bottom: 1rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .vote-btn { background: #eee; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        footer { text-align: center; padding: 2rem; color: #666; }
    </style>
</head>
<body>

<header>
    <svg class="logo" viewBox="0 0 100 100"><path fill="white" d="M50 10L15 90h20l15-35 15 35h20L50 10zM50 25l10 25H40l10-25z"/></svg>
    <div class="nav-links">
        <a href="https://audiory.site">Back to Audiory</a>
        <a href="#" id="authAction">Login to Request</a>
    </div>
</header>

<div class="main-content">
    <h2>Feature Requests</h2>
    <div id="requestList">
        </div>
</div>

<footer>
    <p>&copy; 2026 Audiory. All Rights Reserved.</p>
</footer>

<script type="module">
    // 1. Initialize Firebase (Add your config here)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { /* YOUR CONFIG */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // 2. Fetch and Render Requests
    const q = query(collection(db, "requests"), orderBy("votes", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('requestList');
        list.innerHTML = "";
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            list.innerHTML += `
                <div class="request-card">
                    <div>
                        <h3>${data.title}</h3>
                        <p>${data.description} — <strong>by ${data.username}</strong></p>
                    </div>
                    <button class="vote-btn" onclick="vote('${docSnap.id}')">
                        ▲ ${data.votes || 0}
                    </button>
                </div>`;
        });
    });

    // 3. Voting Function
    window.vote = async (id) => {
        if (!auth.currentUser) return alert("Please log in to vote!");
        const docRef = doc(db, "requests", id);
        await updateDoc(docRef, { votes: increment(1) });
    };

    // 4. Handle Auth UI
    onAuthStateChanged(auth, (user) => {
        const btn = document.getElementById('authAction');
        if (user) {
            btn.innerText = "Logout";
            btn.onclick = () => auth.signOut();
        }
    });
</script>

</body>
</html>
